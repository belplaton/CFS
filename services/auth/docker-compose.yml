version: '3.8'

services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-auth-dev
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://cloudstorage:cloudstorage_secret@postgres:5432/cloudstorage
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

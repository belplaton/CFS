version: '3.8'

services:
  preview:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-preview-dev
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      - FILE_SERVICE_URL=http://file:8000
      - SERVICE_API_KEY=${SERVICE_API_KEY:-}
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

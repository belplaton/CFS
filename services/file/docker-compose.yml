version: '3.8'

services:
  file:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-file-dev
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://cloudstorage:cloudstorage_secret@postgres:5432/cloudstorage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin_secret
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

# ===========================================
# Nginx Configuration for CFS (Cloud File Storage)
# ===========================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ===========================================
    # Basic Settings
    # ===========================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ===========================================
    # Rate Limiting Zones
    # ===========================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # Connection limiting for auth endpoints
    limit_conn_zone $binary_remote_addr zone=auth_conn:10m;

    # ===========================================
    # Upstream Definitions
    # ===========================================
    
    # Auth Service (Go)
    upstream auth_service {
        server auth-service:8081;
        keepalive 32;
    }

    # File Service (Python + FastAPI)
    upstream file_service {
        server file-service:8082;
        keepalive 32;
    }

    # Storage Service (Go)
    upstream storage_service {
        server storage-service:8083;
        keepalive 32;
    }

    # Frontend (BFF + Blazor)
    upstream frontend {
        server frontend:5180;
        keepalive 32;
    }

    # ===========================================
    # Main Server Block
    # ===========================================
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ===========================================
        # Health Check Endpoint
        # ===========================================
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location = /ready {
            access_log off;
            return 200 "ready\n";
            add_header Content-Type text/plain;
        }

        # ===========================================
        # Frontend (Blazor) - Root Path
        # ===========================================
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support (for Blazor SignalR)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ===========================================
        # Auth Service API
        # ===========================================
        location /api/auth/ {
            # Rate limiting for auth endpoints
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn auth_conn 10;

            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ===========================================
        # File Service API
        # ===========================================
        location /api/files/ {
            # Rate limiting for file operations
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://file_service;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ===========================================
        # File Upload Endpoint (special handling)
        # ===========================================
        location = /api/files/upload {
            # Stricter rate limiting for uploads
            limit_req zone=upload_limit burst=5 nodelay;

            proxy_pass http://file_service;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Content-Length $content_length;
            
            # Large file support
            client_max_body_size 100M;
            
            # Timeouts for large files
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Disable request buffering for uploads
            proxy_request_buffering off;
        }

        # ===========================================
        # File Download Endpoint (special handling)
        # ===========================================
        location ~ ^/api/files/(.+)/download$ {
            proxy_pass http://file_service;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Large file download support
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            
            # Timeouts for large files
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ===========================================
        # Folders API
        # ===========================================
        location /api/folders/ {
            # Rate limiting for folder operations
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://file_service;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ===========================================
        # Internal Storage Service (not exposed publicly)
        # ===========================================
        # Note: Storage service is only accessible internally
        # File service communicates with it directly via Docker network
        # This is intentional for security - clients should not access storage directly

        # ===========================================
        # Static Assets (if served by nginx)
        # ===========================================
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ===========================================
        # Favicon
        # ===========================================
        location = /favicon.ico {
            proxy_pass http://frontend;
            access_log off;
            log_not_found off;
            expires 30d;
        }

        # ===========================================
        # Error Pages
        # ===========================================
        error_page 400 /400.html;
        error_page 401 /401.html;
        error_page 403 /404.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /400.html {
            internal;
            root /usr/share/nginx/html/errors;
        }

        location = /401.html {
            internal;
            root /usr/share/nginx/html/errors;
        }

        location = /404.html {
            internal;
            root /usr/share/nginx/html/errors;
        }

        location = /50x.html {
            internal;
            root /usr/share/nginx/html/errors;
        }
    }

    # ===========================================
    # HTTPS Server Block (Production)
    # ===========================================
    # Uncomment and configure for production with SSL
    #
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name your-domain.com;
    #
    #     # SSL Configuration
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_session_tickets off;
    #
    #     # Modern SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # OCSP Stapling
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #
    #     # Include all the same location blocks as above
    #     # ...
    # }
}

version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: cfs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cfs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-cfs_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - cfs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfs_user} -d ${POSTGRES_DB:-cfs_database}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # MinIO Object Storage
  # ===========================================
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-16-56Z
    container_name: cfs-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-your_secure_minio_password_here}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_ENDPOINT_EXTERNAL:-9000}:9000"   # API
      - "9001:9001"                               # Console
    networks:
      - cfs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # MinIO Client (creates bucket on startup)
  # ===========================================
  minio-init:
    image: minio/mc:RELEASE.2024-12-18T13-16-56Z
    container_name: cfs-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minio_admin} ${MINIO_ROOT_PASSWORD:-your_secure_minio_password_here};
      mc mb -p myminio/${MINIO_BUCKET:-cfs-files} || true;
      mc policy set download myminio/${MINIO_BUCKET:-cfs-files} || true;
      exit 0;
      "
    networks:
      - cfs-network

  # ===========================================
  # Auth Service (Go)
  # ===========================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: cfs-auth-service
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Database
      POSTGRES_USER: ${POSTGRES_USER:-cfs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-cfs_database}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your_super_secret_jwt_access_key_here_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_super_secret_jwt_refresh_key_here_min_32_chars}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      
      # Service
      AUTH_SERVICE_HOST: ${AUTH_SERVICE_HOST:-0.0.0.0}
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-8081}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:${AUTH_SERVICE_PORT:-8081}"
    networks:
      - cfs-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${AUTH_SERVICE_PORT:-8081}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # File Service (Python + FastAPI)
  # ===========================================
  file-service:
    build:
      context: ./services/file-service
      dockerfile: Dockerfile
    container_name: cfs-file-service
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # Database
      POSTGRES_USER: ${POSTGRES_USER:-cfs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_secure_password_here}
      POSTGRES_DB: ${POSTGRES_DB:-cfs_database}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-cfs_user}:${POSTGRES_PASSWORD:-your_secure_password_here}@postgres:5432/${POSTGRES_DB:-cfs_database}
      
      # Storage Service URL
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL:-http://storage-service:8083}
      
      # Auth Service URL (for token validation)
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      
      # Service
      FILE_SERVICE_HOST: ${FILE_SERVICE_HOST:-0.0.0.0}
      FILE_SERVICE_PORT: ${FILE_SERVICE_PORT:-8082}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${FILE_SERVICE_PORT:-8082}:${FILE_SERVICE_PORT:-8082}"
    networks:
      - cfs-network
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FILE_SERVICE_PORT:-8082}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # Storage Service (Go)
  # ===========================================
  storage-service:
    build:
      context: ./services/storage-service
      dockerfile: Dockerfile
    container_name: cfs-storage-service
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      
      # MinIO
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_app_access_key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_app_secret_key}
      MINIO_BUCKET: ${MINIO_BUCKET:-cfs-files}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      
      # Service
      STORAGE_SERVICE_HOST: ${STORAGE_SERVICE_HOST:-0.0.0.0}
      STORAGE_SERVICE_PORT: ${STORAGE_SERVICE_PORT:-8083}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${STORAGE_SERVICE_PORT:-8083}:${STORAGE_SERVICE_PORT:-8083}"
    networks:
      - cfs-network
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${STORAGE_SERVICE_PORT:-8083}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # Frontend (Blazor + BFF)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cfs-frontend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT:-Development}
      ASPNETCORE_URLS: "http://+:5180"
      
      # Backend URLs (внутри Docker сети)
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT:-8081}
      FILE_SERVICE_URL: http://file-service:${FILE_SERVICE_PORT:-8082}
      STORAGE_SERVICE_URL: http://storage-service:${STORAGE_SERVICE_PORT:-8083}
      
      # CORS для nginx
      CORS_ALLOWED_ORIGINS: "http://localhost:${NGINX_PORT:-80},http://localhost:${NGINX_SSL_PORT:-443}"
      
      # Переключение mock/real gateway (по умолчанию false для Docker)
      USE_MOCK_GATEWAYS: ${USE_MOCK_GATEWAYS:-false}
    ports:
      - "5180:5180"
    networks:
      - cfs-network
    depends_on:
      auth-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5180/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # Nginx Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: cfs-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    networks:
      - cfs-network
    depends_on:
      auth-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      frontend:
        condition: service_started

# ===========================================
# Networks
# ===========================================
networks:
  cfs-network:
    driver: bridge
    name: cfs-network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    name: cfs-postgres-data
  minio_data:
    name: cfs-minio-data



services:
  # ==================== Gateway ====================
  gateway:
    image: caddy:2-alpine
    container_name: cloud-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth
      - file
      - preview
      - frontend
    networks:
      - cloud-network

  # ==================== PostgreSQL - Auth Service ====================
  postgres-auth:
    image: postgres:15-alpine
    container_name: cloud-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudstorage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB_AUTH:-cloudstorage_auth}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudstorage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PostgreSQL - File Service ====================
  postgres-file:
    image: postgres:15-alpine
    container_name: cloud-postgres-file
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudstorage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB_FILE:-cloudstorage_file}
    volumes:
      - postgres_file_data:/var/lib/postgresql/data
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudstorage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: cloud-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: cloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Auth Service ====================
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: cloud-auth
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ENV=${ENV:-development}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cloudstorage}:${POSTGRES_PASSWORD}@postgres-auth:5432/${POSTGRES_DB_AUTH:-cloudstorage_auth}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - SMTP_HOST=${SMTP_HOST:-smtp.mailtrap.io}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@cloudstorage.local}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SERVICE_API_KEY=${SERVICE_API_KEY:?Set SERVICE_API_KEY in .env}
      - AUTH_SERVICE_URL=http://auth:8000
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== File Service ====================
  file:
    build:
      context: ./services/file
      dockerfile: Dockerfile
    container_name: cloud-file
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ENV=${ENV:-development}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cloudstorage}:${POSTGRES_PASSWORD}@postgres-file:5432/${POSTGRES_DB_FILE:-cloudstorage_file}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-cloudstorage}
      - DEFAULT_STORAGE_QUOTA=${DEFAULT_STORAGE_QUOTA:-5368709120}
      - PREMIUM_STORAGE_QUOTA=${PREMIUM_STORAGE_QUOTA:-107374182400}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - AUTH_SERVICE_URL=http://auth:8000
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres-file:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Preview Service ====================
  preview:
    build:
      context: ./services/preview
      dockerfile: Dockerfile
    container_name: cloud-preview
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - FILE_SERVICE_URL=http://file:8000
    depends_on:
      file:
        condition: service_healthy
    networks:
      - cloud-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Frontend ====================
  # Build and serve static files via nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: cloud-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api}
    networks:
      - cloud-network

# ==================== Networks ====================
networks:
  cloud-network:
    driver: bridge

# ==================== Volumes ====================
volumes:
  postgres_auth_data:
    driver: local
  postgres_file_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
